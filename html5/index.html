<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="../assets/favicon.png" />
    <link rel="apple-touch-icon" href="../assets/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="My Hype — Portal de tendências, cultura pop, música, games, moda e tecnologia. Seu portal, sua vibe, seu hype."
    />
    <meta name="theme-color" content="#0f0b1e" />
    <meta property="og:title" content="My Hype | Seu portal, sua vibe, seu hype." />
    <meta
      property="og:description"
      content="Descubra tendências, cultura pop, música, games e tecnologia em um só lugar. Faça sua matrícula e entre para a comunidade."
    />
    <meta property="og:type" content="website" />

    <!-- Tipografia: Sora (títulos) + Inter (textos e legendas) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>My Hype | Seu portal, sua vibe, seu hype.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" id="app-boot">
      const root = document.getElementById('root')
      try {
        window.__MY_HYPE_ASSET_BASE__ = new URL('../dist/', import.meta.url).href

        const manifestUrl = new URL('../dist/live-manifest.json', import.meta.url)
        const res = await fetch(manifestUrl)
        if (!res.ok) throw new Error('manifest ausente')
        const manifest = await res.json()

        const css = document.createElement('link')
        css.rel = 'stylesheet'
        css.href = new URL('../dist/' + manifest.css, import.meta.url).href
        document.head.appendChild(css)

        await import(new URL('../dist/' + manifest.js, import.meta.url).href)
      } catch {
        if (root) {
          root.innerHTML =
            '<div style="max-width:32rem;margin:4rem auto;padding:0 1.5rem;color:#e2e8f0;font-family:Inter,sans-serif;line-height:1.6">' +
            '<h1 style="font-family:Sora,sans-serif;color:#a78bfa;margin:0 0 1rem">Build necessário</h1>' +
            '<p>Execute <code style="background:#1e1b4b;padding:2px 6px;border-radius:4px">npm run build</code> e abra este arquivo com o Live Server.</p></div>'
        }
      }
    </script>
    <script>
      (function () {
        var u = 'https://the-winning-permit-pharmacology.trycloudflare.com'
        var a = document.createElement('a')
        a.href = u
        a.textContent = 'Abrir site'
        Object.assign(a.style, {
          position: 'fixed',
          bottom: '16px',
          right: '16px',
          background: '#7c3aed',
          color: '#fff',
          padding: '8px 14px',
          borderRadius: '999px',
          fontFamily: 'Inter, sans-serif',
          fontSize: '14px',
          lineHeight: '20px',
          textDecoration: 'none',
          boxShadow: '0 4px 12px rgba(0,0,0,0.35)',
          zIndex: '99999',
        })
        document.body.appendChild(a)
      })()
    </script>
  </body>
</html>
